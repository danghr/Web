---
layout: default
---

<p><a href="{{ site.url }}/">Back to Home</a> &emsp; {% if page.back %} <a href="{{ site.url }}{{ page.back_url }}">Back to {{ page.back }}</a> {% endif %}</p>

<h2>{{ page.title }}</h2>
<small>{{ page.date | date: "%Y-%m-%d" }}<br></small>
<br>
<!-- <p class="view">by {{ page.author | default: site.author }}</p> -->

{{ content }}

{% if page.tags %}
  <small><br>Tags: <em>{{ page.tags | join: "</em> - <em>" }}</em></small>
{% endif %}
